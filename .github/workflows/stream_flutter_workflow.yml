name: stream_flutter_workflow

env:
  flutter_version: "3.x"

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Centralizes every gating decision for this workflow — path filter,
  # draft state, and push-vs-PR semantics. Downstream jobs only need a
  # single `if: needs.gate.outputs.should_run == 'true'`. A job skipped
  # this way reports `success` to branch protection (vs. `on.paths`
  # filtering, which hangs forever) — see
  # https://docs.github.com/en/pull-requests/collaborating-with-pull-requests/collaborating-on-repositories-with-code-quality-features/troubleshooting-required-status-checks
  #
  # `push` events always run (no draft/path gate), but downstream jobs still
  # use the diff-aware `:changes` scripts. On a master push, `HEAD~1` is the
  # previous tip, so the scope is exactly the merged commit's changes —
  # matching what the PR ran.
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ github.event_name == 'push' || (steps.filter.outputs.relevant == 'true' && github.event.pull_request.draft != true) }}
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6

      - name: "Detect Path Changes"
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            relevant:
              - 'packages/**'
              - 'sample_app/**'
              - '.github/workflows/stream_flutter_workflow.yml'

  analyze:
    needs: gate
    timeout-minutes: 15
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: "Install Flutter"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter_version }}
          channel: stable
          cache-key: flutter-:os:-:channel:-:version:-:arch:-:hash:-${{ hashFiles('**/pubspec.lock') }}
      - name: "Install Tools"
        run: |
          flutter pub global activate melos
      - name: "Bootstrap Workspace"
        run: melos bootstrap --verbose
      - name: "Dart Analyze"
        run: melos run analyze:changes
      # Only on PRs targeting master — feature branches (v10, design-refresh,
      # etc.) often carry unreleased version numbers that aren't ready for a
      # publish dry-run yet.
      - name: "Pub Check"
        if: github.base_ref == 'master'
        run: melos run lint:pub:changes

  format:
    needs: gate
    runs-on: ubuntu-latest
    if: needs.gate.outputs.should_run == 'true'
    timeout-minutes: 15
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: "Install Flutter"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter_version }}
          channel: stable
          cache-key: flutter-:os:-:channel:-:version:-:arch:-:hash:-${{ hashFiles('**/pubspec.lock') }}
      - name: "Install Tools"
        run: |
          flutter pub global activate melos
      - name: "Bootstrap Workspace"
        run: melos bootstrap
      - name: "Melos Format"
        run: melos run format:changes
      - name: "Validate Formatting"
        run: |
          ./.github/workflows/scripts/validate-formatting.sh

  test:
    needs: gate
    runs-on: ubuntu-latest
    if: needs.gate.outputs.should_run == 'true'
    timeout-minutes: 30
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: "Install Flutter"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter_version }}
          channel: stable
          cache-key: flutter-:os:-:channel:-:version:-:arch:-:hash:-${{ hashFiles('**/pubspec.lock') }}
      # This step is needed due to https://github.com/actions/runner-images/issues/11279
      - name: Install SQLite3
        run: sudo apt-get update && sudo apt-get install -y sqlite3 libsqlite3-dev
      - name: "Install Tools"
        run: |
          flutter pub global activate melos
          flutter pub global activate remove_from_coverage
      - name: "Bootstrap Workspace"
        run: melos bootstrap
      - name: "Flutter Test"
        run: melos run test:changes
      - name: "Collect Coverage"
        run: melos run coverage:ignore-file --no-select
      # Coverage thresholds skip packages whose tests didn't run on this PR —
      # `hashFiles` returns an empty string when the path is missing. Without
      # this guard, the action errors on missing files for unaffected packages.
      - name: "Stream Chat Coverage Check"
        if: hashFiles('packages/stream_chat/coverage/lcov.info') != ''
        uses: VeryGoodOpenSource/very_good_coverage@v3.0.0
        with:
          path: packages/stream_chat/coverage/lcov.info
          min_coverage: 70
      - name: "Stream Chat Localizations Coverage Check"
        if: hashFiles('packages/stream_chat_localizations/coverage/lcov.info') != ''
        uses: VeryGoodOpenSource/very_good_coverage@v3.0.0
        with:
          path: packages/stream_chat_localizations/coverage/lcov.info
          min_coverage: 100
      - name: "Stream Chat Persistence Coverage Check"
        if: hashFiles('packages/stream_chat_persistence/coverage/lcov.info') != ''
        uses: VeryGoodOpenSource/very_good_coverage@v3.0.0
        with:
          path: packages/stream_chat_persistence/coverage/lcov.info
          min_coverage: 95
      - name: "Stream Chat Flutter Core Coverage Check"
        if: hashFiles('packages/stream_chat_flutter_core/coverage/lcov.info') != ''
        uses: VeryGoodOpenSource/very_good_coverage@v3.0.0
        with:
          path: packages/stream_chat_flutter_core/coverage/lcov.info
          min_coverage: 30
      - name: "Stream Chat Flutter Coverage Check"
        if: hashFiles('packages/stream_chat_flutter/coverage/lcov.info') != ''
        uses: VeryGoodOpenSource/very_good_coverage@v3.0.0
        with:
          path: packages/stream_chat_flutter/coverage/lcov.info
          min_coverage: 44
      # Upload last so we never push coverage that failed local thresholds.
      - name: "Upload Coverage"
        uses: codecov/codecov-action@v5
        with:
          token: ${{secrets.CODECOV_TOKEN}}
          files: packages/*/coverage/lcov.info

  build:
    name: build (${{ matrix.platform }})
    needs: gate
    runs-on: ${{ matrix.os }}
    if: needs.gate.outputs.should_run == 'true'
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
            working-directory: sample_app/android
            build-command: bundle exec fastlane build_apk
          - platform: ios
            os: macos-15 # Requires xcode 15 or later
            working-directory: sample_app/ios
            build-command: bundle exec fastlane build_ipa no_codesign:true

    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: "Install Flutter"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter_version }}
          channel: stable
          cache-key: flutter-:os:-:channel:-:version:-:arch:-:hash:-${{ hashFiles('**/pubspec.lock') }}
      - uses: maxim-lobanov/setup-xcode@v1
        if: matrix.platform == 'ios'
        with:
          xcode-version: '26.3'
      - name: "Install Tools"
        run: flutter pub global activate melos
      - name: "Bootstrap Workspace"
        run: melos bootstrap
      - name: Setup Ruby and Gems
        uses: ruby/setup-ruby@v1
        with:
          working-directory: ${{ matrix.working-directory }}
          bundler-cache: true
      - name: "Build ${{ matrix.platform }} App"
        working-directory: ${{ matrix.working-directory }}
        run: ${{ matrix.build-command }}
