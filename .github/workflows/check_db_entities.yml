name: check_db_entities

on:
  pull_request_target:

concurrency:
  # Use PR number — github.ref is the base branch under pull_request_target.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# pull_request_target needs explicit perms; fork PRs default to read-only.
permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  # Centralizes every gating decision for this workflow — currently just a
  # path filter. Downstream jobs only need a single
  # `if: needs.gate.outputs.should_run == 'true'`. A job skipped this way
  # reports `success` to branch protection (vs. `on.paths` filtering, which
  # hangs forever) — see
  # https://docs.github.com/en/pull-requests/collaborating-with-pull-requests/collaborating-on-repositories-with-code-quality-features/troubleshooting-required-status-checks
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.filter.outputs.persistence }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🛤️ Detect Path Changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            persistence:
              - 'packages/stream_chat_persistence/**'
              - '.github/workflows/check_db_entities.yml'

  check_entity_modifications:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🔎 Check DB Entity Changes
        id: check_entities
        run: |
          ENTITY_DIR="packages/stream_chat_persistence/lib/src/entity"
          DB_FILE="packages/stream_chat_persistence/lib/src/db/drift_chat_database.dart"
          TEMP_FILE="modified_entities"
          BASE_BRANCH="${{ github.base_ref }}"
          PR_HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          echo "Using base branch: origin/$BASE_BRANCH for comparison"

          # Fetch PR head (refs only; full history needed for merge-base).
          git fetch --no-tags origin "$PR_HEAD_SHA"

          # Check if any entity files have changed compared to the base branch
          git diff --name-only "origin/$BASE_BRANCH...$PR_HEAD_SHA" -- $ENTITY_DIR > $TEMP_FILE.raw
          grep -E '\.dart$' $TEMP_FILE.raw > $TEMP_FILE || [ $? -eq 1 ]

          if [ ! -s "$TEMP_FILE" ]; then
            echo "✅ No entity files changed."
            echo "has_changes=false" >> $GITHUB_OUTPUT
            rm $TEMP_FILE
            exit 0
          fi

          echo "⚠️ Entity files modified:"
          cat $TEMP_FILE

          # Set modified files as output
          echo "modified_files<<EOF" >> $GITHUB_OUTPUT
          cat $TEMP_FILE >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "has_changes=true" >> $GITHUB_OUTPUT

          # Parse the `int get schemaVersion => EXPR;` expression from both
          # sides — base & head — so we can compare values and suggest a bump.
          extract_version_expr() {
            git show "$1:$DB_FILE" 2>/dev/null \
              | sed -nE 's/.*schemaVersion[[:space:]]*=>[[:space:]]*([^;]+);.*/\1/p' \
              | head -n1
          }

          BASE_EXPR=$(extract_version_expr "origin/$BASE_BRANCH")
          HEAD_EXPR=$(extract_version_expr "$PR_HEAD_SHA")

          if [ -z "$BASE_EXPR" ] || [ -z "$HEAD_EXPR" ]; then
            echo "::warning::Could not parse schemaVersion from $DB_FILE; skipping version check."
            echo "version_bumped=unknown" >> $GITHUB_OUTPUT
            exit 0
          fi

          BASE_VERSION=$((BASE_EXPR))
          HEAD_VERSION=$((HEAD_EXPR))

          echo "Base schemaVersion: $BASE_VERSION ($BASE_EXPR)"
          echo "Head schemaVersion: $HEAD_VERSION ($HEAD_EXPR)"

          # Suggest a bump by incrementing the last integer in the base
          # expression — preserves the existing `1000 + N` style.
          LAST_NUM=$(echo "$BASE_EXPR" | grep -oE '[0-9]+' | tail -n1)
          NEW_LAST_NUM=$((LAST_NUM + 1))
          SUGGESTED_EXPR=$(echo "$BASE_EXPR" | sed -E "s/${LAST_NUM}([^0-9]*)\$/${NEW_LAST_NUM}\1/")

          echo "base_expr=$BASE_EXPR" >> $GITHUB_OUTPUT
          echo "head_version=$HEAD_VERSION" >> $GITHUB_OUTPUT
          echo "suggested_expr=$SUGGESTED_EXPR" >> $GITHUB_OUTPUT

          if [ "$HEAD_VERSION" -le "$BASE_VERSION" ]; then
            echo "❌ schemaVersion was not bumped ($BASE_VERSION → $HEAD_VERSION)."
            echo "version_bumped=false" >> $GITHUB_OUTPUT
          else
            echo "✅ schemaVersion bumped: $BASE_VERSION → $HEAD_VERSION."
            echo "version_bumped=true" >> $GITHUB_OUTPUT
          fi

      - name: 🧱 Build Comment Body
        if: steps.check_entities.outputs.has_changes == 'true'
        env:
          MODIFIED_FILES: ${{ steps.check_entities.outputs.modified_files }}
          VERSION_BUMPED: ${{ steps.check_entities.outputs.version_bumped }}
          BASE_EXPR: ${{ steps.check_entities.outputs.base_expr }}
          SUGGESTED_EXPR: ${{ steps.check_entities.outputs.suggested_expr }}
          HEAD_VERSION: ${{ steps.check_entities.outputs.head_version }}
        # Multi-line content is written to a file rather than a step output —
        # passing it through `${{ outputs.x }}` into `body:` would break YAML
        # parsing on the second line.
        run: |
          {
            echo '## ⚠️ Database Entity Files Modified'
            echo ''
            echo 'The following database entity files have been modified in this PR:'
            echo '```'
            echo "$MODIFIED_FILES"
            echo '```'
            echo ''
            echo '### 📝 Remember to:'
            case "$VERSION_BUMPED" in
              false)
                echo "1. **Bump the database schema version** in \`packages/stream_chat_persistence/lib/src/db/drift_chat_database.dart\` — CI will fail until this is done:"
                echo ''
                echo '   ```diff'
                echo "   -  int get schemaVersion => ${BASE_EXPR};"
                echo "   +  int get schemaVersion => ${SUGGESTED_EXPR};"
                echo '   ```'
                ;;
              true)
                echo "1. ✅ Database schema version bumped to \`${HEAD_VERSION}\`."
                ;;
              *)
                echo "1. Update the database schema version in \`packages/stream_chat_persistence/lib/src/db/drift_chat_database.dart\`."
                ;;
            esac
            echo '2. Update entity schema tests if necessary.'
            echo ''
            echo '*Note: This comment is automatically generated by the CI workflow.*'
          } > comment_body.md

      - name: 🔍 Find Comment
        if: steps.check_entities.outputs.has_changes == 'true'
        uses: peter-evans/find-comment@v4
        id: find_comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: Database Entity Files Modified

      - name: 💬 Create or Update Comment
        if: steps.check_entities.outputs.has_changes == 'true'
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: comment_body.md
          edit-mode: replace

      - name: 🚨 Enforce schema version bump
        if: steps.check_entities.outputs.has_changes == 'true' && steps.check_entities.outputs.version_bumped == 'false'
        run: |
          echo "::error file=packages/stream_chat_persistence/lib/src/db/drift_chat_database.dart::Database entity files were modified but \`schemaVersion\` was not bumped. See the PR comment for the suggested change."
          exit 1
