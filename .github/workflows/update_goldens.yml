name: update_goldens

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which goldens to update"
        required: true
        type: choice
        default: both
        options:
          - both
          - sdk
          - docs

jobs:
  update_sdk_goldens:
    if: inputs.target == 'sdk' || inputs.target == 'both'
    runs-on: ubuntu-latest
    steps:
      - name: 📚 Checkout branch
        uses: actions/checkout@v6

      - name: 🐦 Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache-key: flutter-:os:-:channel:-:version:-:arch:-:hash:-${{ hashFiles('**/pubspec.lock') }}

      - name: 📦 Install Tools
        run: flutter pub global activate melos

      - name: 🔧 Bootstrap Workspace
        run: melos bootstrap --verbose

      - name: 🖼️ Update SDK Goldens
        continue-on-error: true
        run: melos run update:goldens:sdk

      - name: 📤 Upload SDK goldens artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-goldens
          path: packages/**/test/**/goldens/**/*.png
          if-no-files-found: ignore
          retention-days: 1

  update_docs_goldens:
    if: inputs.target == 'docs' || inputs.target == 'both'
    runs-on: macos-latest
    steps:
      - name: 📚 Checkout branch
        uses: actions/checkout@v6

      - name: 🐦 Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache-key: flutter-:os:-:channel:-:version:-:arch:-:hash:-${{ hashFiles('**/pubspec.lock') }}

      - name: 📦 Install Tools
        run: flutter pub global activate melos

      - name: 🔧 Bootstrap Workspace
        run: melos bootstrap --verbose

      - name: 🖼️ Update Docs Goldens
        continue-on-error: true
        run: melos run update:goldens:docs

      - name: 📤 Upload docs goldens artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-goldens
          path: docs/**/test/**/goldens/macos/*.png
          if-no-files-found: ignore
          retention-days: 1

  commit_goldens:
    needs: [update_sdk_goldens, update_docs_goldens]
    # `always()` lets this run even when one regen job was skipped (e.g. target=sdk).
    # We commit only if at least one regen job succeeded — a hard failure on either
    # side falls through to a no-op rather than committing partial state.
    if: |
      always() &&
      (needs.update_sdk_goldens.result == 'success' ||
       needs.update_docs_goldens.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: 📚 Checkout branch
        uses: actions/checkout@v6
        with:
          ssh-key: ${{ secrets.BOT_SSH_PRIVATE_KEY }}

      - name: 📥 Download SDK goldens
        if: needs.update_sdk_goldens.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: sdk-goldens
          path: .

      - name: 📥 Download docs goldens
        if: needs.update_docs_goldens.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: docs-goldens
          path: .

      - name: 📤 Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: Update Goldens"
          file_pattern: |
            packages/**/test/**/goldens/**/*.png
            docs/**/test/**/goldens/**/*.png
          commit_user_name: "Stream SDK Bot"
          commit_user_email: "60655709+Stream-SDK-Bot@users.noreply.github.com"
