name: E2E Tests Nightly

on:
  schedule:
    - cron: "0 1 * * 1-5"
  workflow_dispatch:
    inputs:
      mock_server_branch:
        description: "Mock server branch"
        type: string
        required: true
        default: main

permissions:
  contents: read

concurrency:
  group: e2e-nightly-${{ github.ref }}
  cancel-in-progress: true

env:
  flutter_version: "3.x"
  mock_server_branch: ${{ github.event.inputs.mock_server_branch || 'main' }}

jobs:
  setup:
    if: github.repository == 'GetStream/stream-chat-flutter'
    runs-on: ubuntu-latest
    outputs:
      launch_id: ${{ steps.launch.outputs.launch_id }}
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: sample_app
      - id: launch
        env:
          ALLURE_TOKEN: ${{ secrets.ALLURE_TOKEN }}
        run: cd sample_app/android && bundle exec fastlane allure_launch

  android:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        api-level: [34, 31, 28]
    env:
      ALLURE_LAUNCH_ID: ${{ needs.setup.outputs.launch_id }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter_version }}
          channel: stable
          cache-key: flutter-:os:-:channel:-:version:-:arch:-:hash:-${{ hashFiles('**/pubspec.lock') }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: sample_app

      - name: Bootstrap
        run: |
          flutter pub global activate melos
          melos bootstrap
          dart pub global activate patrol_cli

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run e2e (Android emulator)
        uses: reactivecircus/android-emulator-runner@v2
        timeout-minutes: 90
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-snapshot-save -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect
          script: cd sample_app/android && bundle exec fastlane run_e2e_test device:emulator-5554 mock_server_branch:${{ env.mock_server_branch }}

      - name: Upload Allure results
        if: success() || failure()
        env:
          ALLURE_TOKEN: ${{ secrets.ALLURE_TOKEN }}
        run: cd sample_app/android && bundle exec fastlane allure_upload

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: e2e-nightly-android-${{ matrix.api-level }}
          path: sample_app/stream-chat-test-mock-server/logs

  ios:
    needs: setup
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - ios: "26.2"
            device: "iPhone 17 Pro"
            setup_runtime: false
          - ios: "18.5"
            device: "iPhone 16 Pro"
            setup_runtime: false
          - ios: "17.5"
            device: "iPhone 15 Pro"
            setup_runtime: true
    env:
      ALLURE_LAUNCH_ID: ${{ needs.setup.outputs.launch_id }}
    steps:
      - uses: actions/checkout@v6

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.2"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter_version }}
          channel: stable
          cache-key: flutter-:os:-:channel:-:version:-:arch:-:hash:-${{ hashFiles('**/pubspec.lock') }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: sample_app

      - name: Bootstrap
        run: |
          flutter precache --ios
          flutter pub global activate melos
          melos bootstrap
          dart pub global activate patrol_cli

      - uses: ./.github/actions/setup-ios-runtime
        if: ${{ matrix.setup_runtime }}
        timeout-minutes: 60
        with:
          version: ${{ matrix.ios }}
          device: ${{ matrix.device }}

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            sample_app/ios/Pods
            ~/Library/Caches/CocoaPods
          key: pods-${{ matrix.ios }}-${{ hashFiles('pubspec.lock', 'sample_app/ios/Podfile') }}
          restore-keys: pods-${{ matrix.ios }}-

      - name: Boot simulator
        run: |
          if [ "${{ matrix.setup_runtime }}" = "true" ]; then
            bash sample_app/tool/boot_ios_simulator.sh custom-test-device
          else
            bash sample_app/tool/boot_ios_simulator.sh "${{ matrix.device }}" "${{ matrix.ios }}"
          fi

      - name: Run e2e (iOS simulator)
        env:
          IOS_SIMULATOR_VERSION: ${{ matrix.ios }}
        run: cd sample_app/ios && bundle exec fastlane run_e2e_test device:${{ env.device_id }} mock_server_branch:${{ env.mock_server_branch }}

      - name: Upload Allure results
        if: success() || failure()
        env:
          ALLURE_TOKEN: ${{ secrets.ALLURE_TOKEN }}
        run: cd sample_app/ios && bundle exec fastlane allure_upload

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: e2e-nightly-ios-${{ matrix.ios }}
          path: sample_app/stream-chat-test-mock-server/logs

  cleanup:
    needs: [setup, android, ios]
    if: always() && cancelled() && needs.setup.outputs.launch_id != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: sample_app
      - name: Remove Allure launch
        env:
          ALLURE_TOKEN: ${{ secrets.ALLURE_TOKEN }}
          ALLURE_LAUNCH_ID: ${{ needs.setup.outputs.launch_id }}
        run: cd sample_app/android && bundle exec fastlane allure_launch_removal

  slack:
    name: Slack Report
    runs-on: ubuntu-latest
    needs: [android, ios]
    if: failure() && github.event_name == 'schedule'
    steps:
      - uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: "Nightly e2e failed 🌙"
          fields: repo,commit,author,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_NIGHTLY_CHECKS }}
