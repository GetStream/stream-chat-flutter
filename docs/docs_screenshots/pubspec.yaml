name: docs_screenshots
description: Golden test screenshots for Stream Chat Flutter documentation.
publish_to: none

# Note: The environment configuration and dependency versions are managed by Melos.
#
# Do not edit them manually.
#
# Steps to update dependencies:
#   1. Modify the version in the melos.yaml file.
#   2. Run `melos bootstrap` to apply changes.

environment:
  sdk: ^3.11.0
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  record: ^6.2.0
  stream_chat_flutter: ^10.0.1
  stream_core_flutter:
    git:
      url: https://github.com/GetStream/stream-core-flutter
      ref: f94d9ccf3f6cec2c098ec214b1c39095ddec907c
      path: packages/stream_core_flutter

dev_dependencies:
  alchemist: ^0.14.0
  device_preview: ^1.2.0
  emojis: ^0.9.9
  flutter_slidable: ^4.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.5
  plugin_platform_interface: ^2.1.8
  stream_chat_localizations: ^10.0.0-beta.13
  substring_highlight: ^1.0.33

flutter:
  uses-material-design: true
